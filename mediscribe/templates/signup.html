<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediScribe AI — Sign Up</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="logo-icon">🏥</div>
      <h1>MediScribe AI</h1>
      <p>Join thousands of healthcare professionals streamlining their documentation workflow.</p>
      <div class="auth-features" style="margin-top:36px">
        <div class="auth-feature"><span>✅</span><span>Free to get started</span></div>
        <div class="auth-feature"><span>🔒</span><span>Secure & HIPAA-aligned</span></div>
        <div class="auth-feature"><span>⚡</span><span>Generate notes in under 10 seconds</span></div>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-form-box">
      <h2>Create Account</h2>
      <p class="subtitle">Start your free MediScribe AI account today</p>

      <div id="errorMsg" style="display:none;padding:12px;background:#fff5f5;border:1px solid #fed7d7;border-radius:8px;color:#c53030;font-size:.88rem;margin-bottom:16px;"></div>
      <div id="successMsg" style="display:none;padding:12px;background:#f0fff4;border:1px solid #c6f6d5;border-radius:8px;color:#276749;font-size:.88rem;margin-bottom:16px;"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Dr. Jane Smith">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="jane@hospital.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="doctor">Doctor</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <button class="btn-primary" id="signupBtn" onclick="doSignup()">Create Account</button>

      <div class="auth-alt">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>
</div>

<script>
async function doSignup() {
  const btn     = document.getElementById('signupBtn');
  const errEl   = document.getElementById('errorMsg');
  const sucEl   = document.getElementById('successMsg');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  const name  = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('password').value;
  const role  = document.getElementById('role').value;

  if (!name || !email || !pwd) {
    errEl.textContent = 'All fields are required.';
    errEl.style.display = 'block';
    return;
  }
  if (pwd.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters.';
    errEl.style.display = 'block';
    return;
  }

  btn.innerHTML = '<span class="spinner"></span> Creating…';
  btn.disabled  = true;

  const res  = await fetch('/signup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, password: pwd, role }),
  }).catch(() => null);

  if (!res) {
    errEl.textContent   = 'Server not reachable.';
    errEl.style.display = 'block';
    btn.innerHTML       = 'Create Account';
    btn.disabled        = false;
    return;
  }

  const data = await res.json();
  if (data.success) {
    sucEl.textContent   = '✅ Account created! Redirecting to login…';
    sucEl.style.display = 'block';
    setTimeout(() => window.location.href = '/login', 1500);
  } else {
    errEl.textContent   = data.message || 'Signup failed.';
    errEl.style.display = 'block';
    btn.innerHTML       = 'Create Account';
    btn.disabled        = false;
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });
</script>
</body>
</html>
